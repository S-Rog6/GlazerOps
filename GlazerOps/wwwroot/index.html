<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlazerOps</title>
    <base href="/" />
    <script>
        (function () {
            var isGitHubPages = window.location.hostname.endsWith('github.io');
            var base = document.querySelector('base');
            if (base) {
                base.setAttribute('href', isGitHubPages ? '/GlazerOps/' : '/');
            }
        })();
    </script>
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="Icon.png" />
    <link href="GlazerOps.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
    <script>
        // Single Page Apps for GitHub Pages — restore path redirected via 404.html
        // https://github.com/rafgraph/spa-github-pages
        (function (l) {
            if (window.location.hostname.endsWith('github.io') && l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location));
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text" data-loading-text="Preparing GlazerOps…"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="js/storageInterop.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <script>
        (function () {
            if (navigator.permissions && typeof navigator.permissions.query === 'function') {
                navigator.permissions.query = navigator.permissions.query.bind(navigator.permissions);
            }
        })();
    </script>

    <script type="module" src="_framework/blazor.webassembly.js" autostart="false"></script>

    <script>
        if ('serviceWorker' in navigator) {
            const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            const isGitHubPages = location.hostname.endsWith('github.io');

            if (isLocalhost || isGitHubPages) {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    registrations.forEach(registration => registration.unregister());
                });

                if ('caches' in window) {
                    caches.keys().then(keys => {
                        keys.forEach(key => caches.delete(key));
                    });
                }
            } else {
                navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
            }
        }
    </script>

    <script>
        (function () {
            var loadingText = document.querySelector('.loading-progress-text');
            var loadingTimer;

            function updateLoadingText(message) {
                if (!loadingText) {
                    return;
                }

                loadingText.setAttribute('data-loading-text', message);
            }

            function showBootFailure(message) {
                clearTimeout(loadingTimer);

                var app = document.getElementById('app');
                if (!app) {
                    return;
                }

                app.innerHTML =
                    '<div class="loading-failure">' +
                    '<h2>Unable to start GlazerOps</h2>' +
                    '<p>' + message + '</p>' +
                    '<p>Try a hard refresh. On GitHub Pages, stale cached assets can block the first load after deployment.</p>' +
                    '</div>';
            }

            updateLoadingText('Loading application…');

            loadingTimer = window.setTimeout(function () {
                updateLoadingText('Still loading… checking cached assets');
            }, 8000);

            window.addEventListener('error', function (event) {
                if (event && event.message) {
                    showBootFailure(event.message);
                }
            });

            window.addEventListener('unhandledrejection', function (event) {
                var reason = event && event.reason;
                var message = reason && reason.message ? reason.message : 'Application startup failed.';
                showBootFailure(message);
            });

            Blazor.start()
                .then(function () {
                    clearTimeout(loadingTimer);
                })
                .catch(function (error) {
                    var message = error && error.message ? error.message : 'Application startup failed.';
                    showBootFailure(message);
                });
        })();
    </script>
</body>

</html>
