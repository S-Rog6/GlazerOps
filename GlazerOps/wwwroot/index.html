<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlazerOps</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="Icon.png" />
    <link href="GlazerOps.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
    <script>
        // Single Page Apps for GitHub Pages — restore path redirected via 404.html
        // https://github.com/rafgraph/spa-github-pages
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location));
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="js/storageInterop.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        // navigator.permissions.query is a native method that requires this === navigator.permissions.
        // The Blazor WASM VM dispatches native calls without re-attaching the stored receiver
        // (p.DO(...p.L) instead of p.DO.call(p.Ax, ...p.L)), so pre-bind query here before
        // the runtime loads to make every call site work regardless of invocation context.
        (function () {
            if (navigator.permissions && typeof navigator.permissions.query === 'function') {
                navigator.permissions.query = navigator.permissions.query.bind(navigator.permissions);
            }
        })();
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

            if (isLocalhost) {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    registrations.forEach(registration => registration.unregister());
                });
            } else {
                navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
            }
        }
    </script>
</body>

</html>
